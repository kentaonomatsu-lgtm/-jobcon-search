<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>JC 求人サーチ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f8f9fa;
  --brd:#e9ecef;--brd2:#dee2e6;
  --txt:#111827;--txt2:#4b5563;--txt3:#9ca3af;
  --gr:#16a34a;--gr2:#dcfce7;--gr3:#14532d;--gr4:#f0fdf4;
  --bl:#4f46e5;--bl2:#ede9fe;--bl3:#6366f1;--bl4:#dbeafe;
  --or:#d97706;--or2:#fef3c7;
  --rd:#dc2626;--rd2:#fee2e2;
  --pk:#db2777;--pk2:#fdf2f8;
  --tl:#0f766e;--tl2:#f0fdfa;
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 4px 24px rgba(0,0,0,.1);
  --r:16px;--rs:12px;--rx:8px;
}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}

/* ========== TOPBAR ========== */
.topbar{background:var(--bg2);border-bottom:1px solid var(--brd);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.brand-logo{width:32px;height:32px;background:linear-gradient(135deg,#4f46e5 0%,#16a34a 100%);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.brand-logo svg{width:18px;height:18px;fill:#fff;}
.brand-name{font-family:'Inter',sans-serif;font-size:17px;font-weight:800;letter-spacing:-0.04em;color:var(--txt);}
.brand-cnt{font-size:11px;font-weight:600;color:var(--gr);background:var(--gr2);border:1px solid rgba(34,197,94,.3);border-radius:99px;padding:2px 8px;-webkit-text-fill-color:var(--gr);display:none;}
.sw{flex:1;position:relative;max-width:440px;}
.sw input{width:100%;background:var(--bg3);border:1.5px solid var(--brd);border-radius:99px;padding:8px 14px 8px 38px;font-size:14px;font-family:inherit;color:var(--txt);outline:none;transition:all .2s;}
.sw input:focus{border-color:var(--bl);background:var(--bg2);box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.sw input::placeholder{color:var(--txt3);}
.sw-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:var(--txt3);pointer-events:none;}
.tbr{display:flex;align-items:center;gap:6px;margin-left:auto;}
.ib{height:36px;padding:0 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid var(--brd);display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap;color:var(--txt2);background:transparent;}
.ib svg{width:14px;height:14px;fill:currentColor;}
.ib:hover{border-color:var(--brd2);color:var(--txt);}
.ib-prof{border-color:rgba(99,102,241,.4);color:var(--bl3);}
.ib-prof.on{background:var(--bl);border-color:var(--bl);color:#fff;}
.ib-f.on{background:var(--gr3);border-color:var(--gr3);color:#fff;}
.ib-r{color:var(--rd);border-color:rgba(239,68,68,.3);display:none;}
.ib-r.on{display:flex;}
.fbadge{background:rgba(255,255,255,.2);border-radius:99px;font-size:10px;padding:1px 5px;}

/* ========== QUICK FILTERS ========== */
.qbar{background:var(--bg2);border-bottom:1px solid var(--brd);padding:8px 16px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.qbar::-webkit-scrollbar{display:none;}
.qchip{flex-shrink:0;font-size:12px;font-weight:600;padding:5px 13px;border-radius:99px;border:1.5px solid var(--brd);color:var(--txt2);cursor:pointer;background:transparent;font-family:inherit;transition:all .15s;white-space:nowrap;}
.qchip:hover{border-color:var(--brd2);color:var(--txt);}
.qchip.on{background:var(--bl);border-color:var(--bl);color:#fff;}
.qchip.on-gr{background:var(--gr3);border-color:var(--gr3);color:#fff;}

/* ========== PROFILE PANEL ========== */
.ppanel{background:linear-gradient(135deg,#ede9fe 0%,#dbeafe 100%);border-bottom:1px solid rgba(99,102,241,.2);padding:14px 16px;display:none;flex-shrink:0;}
.ppanel.on{display:block;}
.pp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.pp-title{font-size:11px;font-weight:700;color:#4f46e5;letter-spacing:.1em;text-transform:uppercase;}
.pp-close{background:rgba(0,0,0,.08);border:none;color:var(--txt2);border-radius:99px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;}
.pp-fields{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
.pp-f{display:flex;flex-direction:column;gap:4px;}
.pp-f label{font-size:10px;font-weight:700;color:#6366f1;letter-spacing:.08em;text-transform:uppercase;}
.pp-f input,.pp-f select{height:34px;padding:0 10px;background:#fff;border:1.5px solid rgba(99,102,241,.3);border-radius:var(--rx);font-size:13px;font-family:inherit;color:var(--txt);outline:none;transition:all .2s;min-width:100px;}
.pp-f select option{color:#111;background:#fff;}
.pp-save{height:34px;padding:0 14px;background:var(--bl);color:#fff;border:none;border-radius:var(--rx);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;align-self:flex-end;white-space:nowrap;}
.pp-saved{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.pp-tag{font-size:11px;font-weight:600;background:rgba(99,102,241,.1);color:#4f46e5;border:1px solid rgba(99,102,241,.25);border-radius:99px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;}
.pp-tag:hover{background:rgba(99,102,241,.2);}
.pp-tag.act{background:var(--bl);color:#fff;border-color:var(--bl);}
.pp-tag-x{opacity:.6;font-size:11px;}

/* ========== ACTIVE FILTER BAR ========== */
.abar{background:rgba(34,197,94,.05);border-bottom:1px solid rgba(34,197,94,.15);padding:6px 16px;display:none;align-items:center;gap:6px;flex-wrap:wrap;}
.abar.on{display:flex;}
.abarlbl{font-size:10px;font-weight:700;color:var(--gr);letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;}
.atags{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
.atag{font-size:11px;font-weight:600;background:rgba(34,197,94,.15);color:var(--gr);border:1px solid rgba(34,197,94,.3);border-radius:99px;padding:3px 9px;display:flex;align-items:center;gap:3px;}
.atag-x{cursor:pointer;opacity:.7;}
.atag-x:hover{opacity:1;}
.abar-clr{font-size:11px;font-weight:700;color:var(--rd);background:rgba(239,68,68,.1);border:none;border-radius:99px;padding:4px 10px;cursor:pointer;font-family:inherit;white-space:nowrap;}

/* ========== SEL BAR ========== */
.selbar{display:none;align-items:center;gap:8px;background:var(--bl);padding:8px 16px;flex-shrink:0;}
.selbar.on{display:flex;}
.seltxt{font-size:13px;font-weight:700;color:#fff;flex:1;}
.seltxt em{color:#c7d2fe;font-style:normal;}
.sbtn{height:34px;padding:0 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;}
.sbtn-cmp{background:#fff;color:var(--bl);}
.sbtn-cw{background:rgba(255,255,255,.2);color:#fff;}
.sbtn-clr{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}

/* ========== MAIN ========== */
.main{display:flex;flex:1;overflow:hidden;}

/* ========== SIDEBAR ========== */
.sidebar{width:256px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .25s;}
.sb-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sb-lbl{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;}
.sb-rst{font-size:11px;font-weight:700;color:var(--rd);background:rgba(239,68,68,.1);border:none;border-radius:99px;padding:3px 9px;cursor:pointer;font-family:inherit;display:none;}
.sb-body{flex:1;overflow-y:auto;padding:12px 14px 24px;}
.sb-body::-webkit-scrollbar{width:3px;}
.sb-body::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:99px;}
.fg{margin-bottom:18px;}
.fgl{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.fgc{background:var(--bl);color:#fff;border-radius:99px;font-size:9px;font-weight:700;padding:1px 5px;display:none;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{font-size:11px;font-weight:500;padding:5px 11px;border-radius:99px;border:1.5px solid var(--brd);color:var(--txt2);cursor:pointer;background:transparent;font-family:inherit;transition:all .15s;}
.chip:hover{border-color:var(--brd2);color:var(--txt);}
.chip.on{background:var(--bl);border-color:var(--bl);color:#fff;}
.rr{display:flex;align-items:center;gap:5px;}
.rr input{flex:1;background:var(--bg3);border:1.5px solid var(--brd);border-radius:var(--rx);padding:7px 9px;font-size:13px;font-family:inherit;color:var(--txt);outline:none;min-width:0;transition:border-color .15s;}
.rr input:focus{border-color:var(--bl);}
.rs{color:var(--txt3);flex-shrink:0;font-size:12px;}
.ai{width:100%;background:var(--bg3);border:1.5px solid var(--brd);border-radius:var(--rx);padding:7px 9px;font-size:13px;font-family:inherit;color:var(--txt);outline:none;transition:border-color .15s;}
.ai:focus{border-color:var(--bl);}
.mh{font-size:10px;color:var(--txt3);margin-bottom:5px;}
.svgw{background:#f0f4ff;border:1.5px solid var(--brd);border-radius:var(--rx);overflow:hidden;margin-bottom:5px;}
.svgw svg{width:100%;display:block;}
.ar{fill:#eff6ff;stroke:#bfdbfe;stroke-width:1.5;cursor:pointer;transition:fill .15s;}
.ar:hover{fill:#dbeafe;}
.ar.on{fill:#4f46e5;stroke:#4f46e5;}
.arl{font-size:9px;fill:#6b7280;pointer-events:none;font-family:'Noto Sans JP',sans-serif;font-weight:700;}
.pchips{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.pchip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;border:1.5px solid var(--brd);color:var(--txt2);cursor:pointer;background:transparent;font-family:inherit;transition:all .15s;}
.pchip:hover{border-color:var(--brd2);color:var(--txt);}
.pchip.on{background:var(--bl);border-color:var(--bl);color:#fff;}

/* ========== CONTENT ========== */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.sort-bar{background:var(--bg2);border-bottom:1px solid var(--brd);padding:6px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sort-lbl{font-size:11px;font-weight:600;color:var(--txt3);}
.sort-sel{background:var(--bg3);border:1.5px solid var(--brd);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--txt);font-family:inherit;outline:none;cursor:pointer;}
.rcnt{font-size:11px;color:var(--txt3);margin-left:auto;}
.rcnt strong{color:var(--gr);font-weight:700;}

/* ========== LIST ========== */
#vlist{flex:1;overflow-y:auto;padding:12px 14px 40px;}
#vlist::-webkit-scrollbar{width:4px;}
#vlist::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:99px;}
.empty{text-align:center;padding:5rem 2rem;}
.empty-ico{font-size:44px;opacity:.15;margin-bottom:12px;}
.empty-txt{font-size:15px;font-weight:600;color:var(--txt3);}

/* ========== CARD ========== */
.card{background:var(--bg2);border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:all .2s;cursor:pointer;position:relative;}
.card:hover{border-color:var(--brd2);box-shadow:var(--sh);}
.card.open{border-color:var(--bl);}
.card.sel{border-color:var(--bl);box-shadow:0 0 0 2px rgba(99,102,241,.25);}
/* 優先順位ライン */
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:99px 0 0 99px;}
.card.p1::before{background:var(--gr);}
.card.p2::before{background:var(--bl3);}
.card.p3::before{background:var(--or);}
.card.p4::before{background:var(--brd2);}
/* マッチ */
.card.match-s{box-shadow:0 0 0 1.5px rgba(34,197,94,.4);}
.card.match-a{box-shadow:0 0 0 1.5px rgba(99,102,241,.4);}

.ctop{padding:14px 16px 14px 20px;display:flex;align-items:flex-start;gap:10px;}
.chk{width:20px;height:20px;border:2px solid var(--brd2);border-radius:5px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
.chk svg{width:11px;height:11px;display:none;}
.card.sel .chk{background:var(--bl);border-color:var(--bl);}
.card.sel .chk svg{display:block;}
.cbody{flex:1;min-width:0;}
.crow1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;}
.cco{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-0.02em;line-height:1.3;}
.csal{text-align:right;flex-shrink:0;}
.saln{font-family:'Inter',sans-serif;font-size:22px;font-weight:800;color:var(--gr);line-height:1;letter-spacing:-0.03em;}
.salu{font-size:10px;font-weight:400;color:var(--txt3);}
.sall{font-size:10px;color:var(--txt3);margin-top:1px;text-align:right;}
.ctit{font-size:11px;color:var(--txt2);margin-bottom:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cloc{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.cloc-ico{width:12px;height:12px;fill:var(--txt3);flex-shrink:0;}
.tags{display:flex;flex-wrap:wrap;gap:3px;}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;border:1px solid transparent;}
.tg{background:rgba(34,197,94,.1);color:var(--gr);border-color:rgba(34,197,94,.25);}
.tb{background:rgba(99,102,241,.1);color:var(--bl3);border-color:rgba(99,102,241,.25);}
.to{background:rgba(245,158,11,.1);color:var(--or);border-color:rgba(245,158,11,.25);}
.tp{background:rgba(236,72,153,.1);color:var(--pk);border-color:rgba(236,72,153,.25);}
.tt{background:rgba(20,184,166,.1);color:var(--tl);border-color:rgba(20,184,166,.25);}
.td{background:rgba(255,255,255,.04);color:var(--txt2);border-color:var(--brd);}
.tag-ng{background:rgba(239,68,68,.1);color:var(--rd);border-color:rgba(239,68,68,.25);}
.bpill{font-size:10px;font-weight:700;background:rgba(236,72,153,.12);color:var(--pk);border-radius:99px;padding:1px 7px;margin-top:2px;display:inline-block;}

/* マッチスコア */
.mscore{display:none;flex-direction:column;align-items:flex-end;flex-shrink:0;margin-left:4px;}
.mscore.on{display:flex;}
.ms-grade{font-size:10px;font-weight:800;border-radius:6px;padding:2px 7px;margin-bottom:3px;}
.ms-s{background:rgba(34,197,94,.15);color:var(--gr);}
.ms-a{background:rgba(99,102,241,.15);color:var(--bl3);}
.ms-b{background:rgba(245,158,11,.15);color:var(--or);}
.ms-x{background:rgba(239,68,68,.15);color:var(--rd);}
.ms-bar{width:48px;height:3px;background:var(--brd2);border-radius:99px;overflow:hidden;}
.ms-fill{height:100%;border-radius:99px;}
.ms-pct{font-size:9px;color:var(--txt3);margin-top:2px;}

/* ボタン */
.cbtns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.cbn{height:32px;padding:0 12px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px;}
.cbn svg{width:11px;height:11px;fill:currentColor;}
.cbn:hover{opacity:.85;}
.cbn-u{background:rgba(99,102,241,.15);color:var(--bl3);border-color:rgba(99,102,241,.25);}
.cbn-c{background:rgba(34,197,94,.1);color:var(--gr);border-color:rgba(34,197,94,.25);}

/* ========== EXPAND ========== */
.cexp{display:none;border-top:1px solid var(--brd);padding:14px 16px 14px 20px;background:var(--bg3);}
.card.open .cexp{display:block;}
.egrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.eg .egl{font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;}
.eg .egv{font-size:12px;font-weight:500;color:var(--txt);}
.catch{font-size:11px;color:var(--txt2);line-height:1.8;background:#fff;border:1.5px solid var(--brd);border-radius:var(--rx);padding:9px 12px;margin-bottom:12px;max-height:66px;overflow:hidden;}
.ebtns{display:flex;gap:6px;flex-wrap:wrap;}
.ebn{height:38px;padding:0 18px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid transparent;display:flex;align-items:center;gap:6px;transition:all .15s;}
.ebn:hover{opacity:.85;}
.ebn-s{background:var(--bl);color:#fff;}
.ebn-talk{background:rgba(245,158,11,.15);color:var(--or);border-color:rgba(245,158,11,.3);}
.ebn-d{background:rgba(239,68,68,.1);color:var(--rd);border-color:rgba(239,68,68,.25);}
/* トーク */
.talk-box{background:rgba(245,158,11,.05);border:1.5px solid rgba(245,158,11,.2);border-radius:var(--rx);padding:12px 14px;margin-top:10px;display:none;}
.talk-box.on{display:block;}
.talk-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.talk-lbl{font-size:10px;font-weight:700;color:var(--or);letter-spacing:.06em;text-transform:uppercase;}
.talk-cp{font-size:11px;font-weight:700;background:rgba(245,158,11,.15);color:var(--or);border:none;border-radius:99px;padding:3px 10px;cursor:pointer;font-family:inherit;}
.talk-body{font-size:12px;color:var(--txt2);line-height:1.9;white-space:pre-wrap;}

/* ========== NEAR VIEW ========== */
#vnear{display:none;flex:1;flex-direction:column;overflow:hidden;}
#vnear.on{display:flex;}
.ntop{background:var(--bg2);border-bottom:1px solid var(--brd);padding:14px 16px;flex-shrink:0;}
.ntitle{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.ntitle-ico{width:15px;height:15px;fill:var(--gr);}
.ninputs{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.nfield{display:flex;flex-direction:column;gap:4px;}
.nfield label{font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;}
.nfield select{height:38px;padding:0 12px;background:#fff;border:1.5px solid var(--brd);border-radius:var(--rx);font-size:13px;font-family:inherit;color:var(--txt);outline:none;cursor:pointer;transition:border-color .2s;min-width:140px;}
.nfield select:focus{border-color:var(--gr);}
.ngo{height:38px;padding:0 22px;background:var(--gr3);color:#fff;border:none;border-radius:var(--rx);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.ngo:hover{background:var(--gr);}
.nclr{height:38px;padding:0 14px;background:var(--bg3);color:var(--txt2);border:1.5px solid var(--brd);border-radius:var(--rx);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:none;}
.nfrow{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
.nfrow label{font-size:10px;font-weight:700;color:var(--txt3);}
.nc{font-size:11px;font-weight:600;padding:4px 11px;border-radius:99px;border:1.5px solid var(--brd);color:var(--txt2);cursor:pointer;background:transparent;font-family:inherit;transition:all .15s;}
.nc:hover{border-color:var(--brd2);color:var(--txt);}
.nc.on{background:var(--bl);border-color:var(--bl);color:#fff;}
.nlimw{margin-left:auto;display:flex;align-items:center;gap:6px;}
.nlimw label{font-size:10px;font-weight:700;color:var(--txt3);}
.nlimw select{height:32px;padding:0 10px;background:var(--bg3);border:1.5px solid var(--brd);border-radius:99px;font-size:11px;font-family:inherit;outline:none;color:var(--txt);cursor:pointer;}
.nstat{margin-top:8px;font-size:12px;color:var(--txt3);}
.nstat strong{color:var(--txt);}
.nlist{flex:1;overflow-y:auto;padding:12px 14px 40px;}
.nlist::-webkit-scrollbar{width:4px;}
.nlist::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:99px;}

/* NEAR CARD */
.nc-card{background:var(--bg2);border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:8px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
.nc-card:hover{border-color:var(--brd2);box-shadow:var(--sh);}
.nc-rank{font-family:'Inter',sans-serif;font-size:20px;font-weight:800;color:var(--brd2);text-align:center;width:32px;flex-shrink:0;line-height:1;}
.nc-rank.top{color:var(--gr);}
.nc-pri{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.nc-body{flex:1;min-width:0;}
.nc-co{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nc-loc{font-size:11px;color:var(--txt2);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.pt-c{font-size:9px;font-weight:700;background:rgba(34,197,94,.12);color:var(--gr);border-radius:99px;padding:1px 6px;}
.pt-p{font-size:9px;font-weight:700;background:rgba(255,255,255,.04);color:var(--txt3);border-radius:99px;padding:1px 6px;}
.nc-r{text-align:right;flex-shrink:0;min-width:90px;}
.nc-km{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;line-height:1;letter-spacing:-0.03em;}
.nc-kmu{font-size:10px;font-weight:400;color:var(--txt3);}
.nc-kml{font-size:9px;color:var(--txt3);margin-top:1px;}
.nc-sal{font-family:'Inter',sans-serif;font-size:14px;font-weight:700;color:var(--gr);margin-top:5px;}
.nc-sall{font-size:9px;color:var(--txt3);}

/* ========== COMPARE MODAL ========== */
.cov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.cov.on{display:flex;}
.cmodal{background:#fff;border:1.5px solid var(--brd);border-radius:20px;width:min(680px,92vw);max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--sh2);}
.cmhdr{padding:18px 22px;display:flex;align-items:center;border-bottom:1px solid var(--brd);}
.cmhdr h2{font-size:15px;font-weight:700;flex:1;color:var(--txt);}
.cmcls{background:var(--bg3);border:none;border-radius:99px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--txt2);}
.cmacts{padding:10px 22px;background:var(--bg3);border-bottom:1px solid var(--brd);display:flex;gap:8px;}
.cmacts button{flex:1;height:40px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
.cmt{background:rgba(34,197,94,.15);color:var(--gr);}
.cmc{background:var(--bl);color:#fff;}
.cmbody{overflow-y:auto;padding:16px 22px;flex:1;}
.cmcard{border:1.5px solid var(--brd);border-radius:var(--rs);padding:14px;margin-bottom:8px;background:var(--bg3);}
.cmno{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.cmco{font-size:15px;font-weight:700;margin-bottom:10px;color:var(--txt);}
.cmgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ci .cl{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.ci .cv{font-size:12px;font-weight:500;color:var(--txt);}
.ci .cv.hl{font-family:'Inter',sans-serif;font-size:16px;font-weight:800;color:var(--gr);}

/* ========== DELETE ========== */
.dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:600;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.dov.on{display:flex;}
.dbox{background:#fff;border:1.5px solid var(--brd);border-radius:20px;padding:24px;width:min(340px,90vw);box-shadow:var(--sh2);}
.dbox h3{font-size:16px;font-weight:700;margin-bottom:7px;color:var(--txt);}
.dbox p{font-size:12px;color:var(--txt2);line-height:1.7;margin-bottom:18px;}
.dco{font-weight:700;color:var(--txt);}
.dbtns{display:flex;gap:8px;}
.dbtns button{flex:1;height:44px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
.dcancel{background:#f3f4f6;color:#374151;}
.dok{background:var(--rd);color:#fff;}

/* ========== TOAST ========== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;border:1px solid #333;padding:10px 20px;border-radius:99px;font-size:12px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s;z-index:9999;white-space:nowrap;box-shadow:var(--sh2);}
.toast.on{opacity:1;}

@media(max-width:768px){
  .sidebar{display:none;}
  .egrid{grid-template-columns:repeat(2,1fr);}
  .saln{font-size:19px;}
  .cco{font-size:14px;}
}
</style>
</head>

function loadProf(i){var p=savedProfs[i];if(!p)return;document.getElementById('p-age').value=p.age||'';document.getElementById('p-gender').value=p.gender||'';document.getElementById('p-pref').value=p.pref||'';document.getElementById('p-shift').value=p.shift||'';document.getElementById('p-dorm').value=p.dorm||'';applyProf();showToast(p.name+' を読み込みました');}
function delProf(i){savedProfs.splice(i,1);localStorage.setItem('jc_profs2',JSON.stringify(savedProfs));renderSavedProfs();}

function calcMatchScore(j){
  var age=parseInt(document.getElementById('p-age').value)||0;
  var gender=document.getElementById('p-gender').value;
  var pref=document.getElementById('p-pref').value;
  var shift=document.getElementById('p-shift').value;
  var dorm=document.getElementById('p-dorm').value;
  var has=!!(age||gender||pref||shift||dorm);
  if(!has)return null;
  var score=0,max=0,ngs=[];
  if(age>0){max+=30;if(age>Number(j.年齢上限))ngs.push('年齢NG');else score+=30;}
  if(gender){max+=25;if(j.性別==='不問'||!j.性別||j.性別===gender)score+=25;else ngs.push('性別NG');}
  if(pref){max+=20;if(j.都道府県===pref)score+=20;}
  if(shift){max+=15;var js=(j.勤務体制||'').split(',');if(js.indexOf(shift)>=0)score+=15;}
  if(dorm==='1'){max+=10;if(j.寮完備==='1')score+=10;else ngs.push('寮なし');}
  if(max===0)return null;
  var pct=Math.round(score/max*100);
  return{pct:pct,grade:pct>=90?'S':pct>=70?'A':pct>=50?'B':'X',ngs:ngs};
}

function genTalk(j){
  var sal=fmtSal(j.給与);
  var lines=['「'+j.都道府県+' '+j.市区町村+'のお仕事はいかがでしょうか？」','','【'+j.社名+'】'];
  if(j.タイトル)lines.push(j.タイトル);
  lines.push('');
  lines.push('📍 '+j.都道府県+' '+j.市区町村+(j.最寄り駅?' ／ '+j.最寄り駅:''));
  lines.push('💰 '+sal.n+sal.u+'（'+sal.l+'）'+(j.祝い金>0?'　🎁 祝い金'+j.祝い金+'万円':''));
  if(j.寮完備==='1')lines.push('🏠 寮完備'+(j.寮費?' ／ '+j.寮費:''));
  if(j.勤務体制)lines.push('🕐 '+j.勤務体制);
  lines.push('');lines.push('ご興味はありますか？');
  return lines.join('\n');
}

function togArea(name){
  var btn=document.getElementById('ar-'+name);
  if(areas.has(name)){areas.delete(name);btn.classList.remove('on');AREA_MAP[name].forEach(function(p){var i=af.pref.indexOf(p);if(i>=0)af.pref.splice(i,1);});}
  else{areas.add(name);btn.classList.add('on');}

function renderPChips(){
  var el=document.getElementById('pchips');
  var ps=[];areas.forEach(function(a){AREA_MAP[a].forEach(function(p){if(allJobs.some(function(j){return j.都道府県===p;}))ps.push(p);});});

function togPref(p){var i=af.pref.indexOf(p);if(i>=0)af.pref.splice(i,1);else af.pref.push(p);renderPChips();updBadge();applyFilter();}

function togC(btn){

  document.querySelectorAll('.qchip[data-g="'+g+'"][data-v="'+v+'"]').forEach(function(c){c.classList.toggle('on',arr.indexOf(v)>=0);});

  var g=btn.dataset.g,v=btn.dataset.v;btn.classList.toggle('on');

function updBadge(){
  var cnt=Object.values(af).reduce(function(s,a){return s+a.length;},0)+(areas.size?1:0);
  var fb=document.getElementById('fbadge');
  fb.textContent=cnt;fb.style.display=cnt?'inline':'none';
  document.getElementById('ib-f').classList.toggle('on',sbOn);
  document.getElementById('ib-r').classList.toggle('on',cnt>0);

  document.getElementById('abar').classList.toggle('on',cnt>0);

  af.gender.forEach(function(v){tags.push({l:'👤 '+v,g:'gender',v:v});});
  af.shift.forEach(function(v){tags.push({l:'🕐 '+v,g:'shift',v:v});});
  if(af.dorm.length)tags.push({l:'🏠 寮完備',g:'dorm',v:'1'});
  if(af.bonus.length)tags.push({l:'🎁 祝い金',g:'bonus',v:'1'});
  af.pri.forEach(function(v){tags.push({l:'★ '+v+'位',g:'pri',v:v});});
  af.gyoshu.forEach(function(v){tags.push({l:v,g:'gyoshu',v:v});});
  af.shokushu.forEach(function(v){tags.push({l:v,g:'shokushu',v:v});});

function rmTag(g,v){
  if(g==='area'){areas.delete(v);var b=document.getElementById('ar-'+v);if(b)b.classList.remove('on');if(AREA_MAP[v])AREA_MAP[v].forEach(function(p){var i=af.pref.indexOf(p);if(i>=0)af.pref.splice(i,1);});renderPChips();}
  else if(g==='pref'){var i=af.pref.indexOf(v);if(i>=0)af.pref.splice(i,1);renderPChips();}
  else{var i=af[g].indexOf(v);if(i>=0)af[g].splice(i,1);document.querySelectorAll('.chip[data-g="'+g+'"][data-v="'+v+'"],.qchip[data-g="'+g+'"][data-v="'+v+'"]').forEach(function(c){c.classList.remove('on');});}
  updBadge();applyFilter();
}
function applyFilter(){
  var kw=document.getElementById('kw').value.trim().toLowerCase();
  var smin=parseFloat(document.getElementById('smin').value)||0;
  var smax=parseFloat(document.getElementById('smax').value)||99999;
  var age=parseInt(document.getElementById('age').value)||0;
  filtered=allJobs.filter(function(j){
    if(areas.size>0){if(af.pref.length>0){if(af.pref.indexOf(j.都道府県)<0)return false;}else{var ok=false;areas.forEach(function(a){if(AREA_MAP[a].indexOf(j.都道府県)>=0)ok=true;});if(!ok)return false;}}
    else if(af.pref.length>0&&af.pref.indexOf(j.都道府県)<0)return false;
    if(af.gyoshu.length&&af.gyoshu.indexOf(j.業種)<0)return false;
    if(af.shokushu.length&&af.shokushu.indexOf(j.職種)<0)return false;
    if(af.gender.length&&af.gender.indexOf(j.性別)<0)return false;
    if(af.pri.length&&af.pri.indexOf(j.優先順位)<0)return false;
    if(af.dorm.indexOf('1')>=0&&j.寮完備!=='1')return false;
    if(af.bonus.indexOf('1')>=0&&j.祝い金<=0)return false;
    if(af.shift.length){var js=(j.勤務体制||'').split(',');if(!af.shift.some(function(s){return js.indexOf(s)>=0;}))return false;}
    if(j.給与<smin||j.給与>smax)return false;
    if(age>0&&age>Number(j.年齢上限))return false;
    if(kw){var h=[j.社名,j.都道府県,j.市区町村,j.業種,j.職種,j.タイトル,j.キャッチ,j.案件名,j.案件ID].join(' ').toLowerCase();if(h.indexOf(kw)<0)return false;}
    return true;
  });
  document.getElementById('rcnt').innerHTML=allJobs.length?'<strong>'+filtered.length+'</strong> / '+allJobs.length+'件':'';
  renderJobs();
}

function renderJobs(){
  var s=document.getElementById('sort').value;
  var jms=filtered.map(function(j){return{j:j,ms:calcMatchScore(j)};});
  jms.sort(function(a,b){
    if(s==='match'){var sa=a.ms?a.ms.pct:0,sb=b.ms?b.ms.pct:0;if(sb!==sa)return sb-sa;return(parseInt(a.j.優先順位)||9)-(parseInt(b.j.優先順位)||9);}
    if(s==='pri')return(parseInt(a.j.優先順位)||9)-(parseInt(b.j.優先順位)||9);
    if(s==='sd')return b.j.給与-a.j.給与;
    if(s==='sa')return a.j.給与-b.j.給与;
    if(s==='bonus')return b.j.祝い金-a.j.祝い金;

function haversine(la1,lo1,la2,lo2){var R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)*Math.sin(dLo/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

  var wd=cands.map(function(j){var c=getCoords(j.都道府県,j.市区町村);var d=c?haversine(base[0],base[1],c[0],c[1]):99999;return{job:j,dist:d,precise:!!(j.市区町村&&CITY_COORDS[j.都道府県+'_'+j.市区町村])};});

  var html='';
  topN.forEach(function(item,idx){var j=item.job,d=item.dist,sal=fmtSal(j.給与);var pri=parseInt(j.優先順位)||4;var km=d<9999?Math.round(d):'?';var kmc=d<100?'#22c55e':d<300?'#818cf8':'#5a6290';var shifts=(j.勤務体制||'').split(',').filter(function(s){return s;});var tagHtml='';if(j.業種)tagHtml+='<span class="tag td">'+j.業種+'</span>';if(j.職種)tagHtml+='<span class="tag tg">'+j.職種+'</span>';if(j.寮完備==='1')tagHtml+='<span class="tag to">🏠寮あり</span>';if(j.祝い金>0)tagHtml+='<span class="tag tp">🎁祝'+j.祝い金+'万</span>';shifts.forEach(function(s){tagHtml+='<span class="tag tt">🕐'+s+'</span>';});
    html+='<div class="nc-card" onclick="goJob(\''+j.案件ID+'\')">'
      +'<div class="nc-rank '+(idx<3?'top':'')+'">'+('0'+(idx+1)).slice(-2)+'</div>'
      +'<div class="nc-pri" style="'+pcls[pri-1]+'">'+pl[pri]+'</div>'
      +'<div class="nc-body"><div class="nc-co">'+j.社名+'</div>'
      +'<div class="nc-loc">'+j.都道府県+' '+j.市区町村+' <span class="'+(item.precise?'pt-c':'pt-p')+'">'+(item.precise?'市区町村':'都道府県')+'</span></div>'
      +'<div class="tags">'+tagHtml+'</div></div>'

  });
  el.innerHTML=html;
